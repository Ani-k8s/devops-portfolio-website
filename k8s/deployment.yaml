apiVersion: apps/v1
kind: Deployment
metadata:
  name: annappa-portfolio
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portfolio
  template:
    metadata:
      labels:
        app: portfolio
    spec:
      containers:
      - name: portfolio
        image: anik8s/annappa-portfolio:v3
        ports:
        - containerPort: 5000